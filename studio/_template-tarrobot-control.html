<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TarroBot · Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root {
  --mg: #FF2E88; --cy: #00E5FF; --ye: #FFD23F;
  --bg: #06030f; --card: rgba(20, 10, 40, 0.92);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at top, rgba(255,46,136,.08), transparent 60%);
  font-family: 'Share Tech Mono', monospace;
  color: #fff;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 60px;
}
h1 {
  font-family: 'Press Start 2P'; font-size: 14px; color: var(--mg);
  letter-spacing: 3px; text-shadow: 0 0 12px rgba(255,46,136,.5);
  margin-bottom: 4px;
}
.sub { font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: 2px; margin-bottom: 22px; }

.card {
  background: var(--card);
  border: 1px solid rgba(0,229,255,.25);
  border-radius: 8px;
  padding: 14px 14px 16px;
  margin-bottom: 14px;
  box-shadow: 0 0 18px rgba(0,229,255,.08);
}
.card h2 {
  font-family: 'Press Start 2P'; font-size: 11px; color: var(--cy);
  letter-spacing: 2px; margin-bottom: 12px;
}

input[type="text"], input[type="number"] {
  width: 100%;
  background: rgba(0,0,0,.5);
  border: 1px solid rgba(0,229,255,.3);
  color: #fff;
  font-family: 'Share Tech Mono';
  font-size: 15px;
  padding: 10px 12px;
  border-radius: 4px;
  outline: none;
  margin-bottom: 8px;
}
input[type="text"]:focus, input[type="number"]:focus { border-color: var(--cy); }

.btn {
  display: inline-block;
  background: rgba(255,46,136,.15);
  border: 1px solid var(--mg);
  color: var(--mg);
  font-family: 'Press Start 2P'; font-size: 10px;
  padding: 12px 16px;
  letter-spacing: 1.5px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.btn:active { background: var(--mg); color: var(--bg); transform: scale(0.97); }
.btn.cy { background: rgba(0,229,255,.12); border-color: var(--cy); color: var(--cy); }
.btn.cy:active { background: var(--cy); color: var(--bg); }
.btn.ye { background: rgba(255,210,63,.12); border-color: var(--ye); color: var(--ye); }
.btn.ye:active { background: var(--ye); color: var(--bg); }
.btn.full { width: 100%; }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-row .btn { flex: 1; min-width: 70px; }

.estados-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.estados-grid .btn {
  font-size: 9px;
  padding: 12px 4px;
  letter-spacing: 0.5px;
}

.row-inline { display: flex; gap: 8px; align-items: center; }
.row-inline input { flex: 1; margin-bottom: 0; }

.log {
  font-size: 10px; color: rgba(255,255,255,.4);
  font-family: 'Share Tech Mono';
  background: rgba(0,0,0,.4);
  padding: 8px 12px;
  border-radius: 4px;
  margin-top: 6px;
  max-height: 80px;
  overflow-y: auto;
}
.log .ok { color: var(--cy); }
.log .err { color: var(--mg); }

.toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.toggle-row label { font-size: 11px; color: rgba(255,255,255,.7); }
.toggle-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--cy); }

/* ── COLA DEL EPISODIO ─────────────────────────────────────────── */
.card.queue {
  border-color: rgba(255, 210, 63, .35);
  box-shadow: 0 0 18px rgba(255,210,63,.12);
}
.card.queue h2 { color: var(--ye); }

select#queueSelect {
  width: 100%;
  background: rgba(0,0,0,.5);
  border: 1px solid rgba(255,210,63,.35);
  color: #fff;
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 4px;
  outline: none;
  margin-bottom: 8px;
}
select#queueSelect:focus { border-color: var(--ye); }

#queueState {
  padding: 8px 10px;
  background: rgba(0,0,0,.4);
  border-radius: 4px;
  margin-bottom: 10px;
  font-size: 11px;
  color: rgba(255,255,255,.8);
  letter-spacing: .5px;
  min-height: 14px;
}
#queueState .badge {
  display: inline-block;
  background: var(--ye);
  color: var(--bg);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  margin-right: 6px;
}
#queueProgress {
  height: 6px;
  background: rgba(255,255,255,.08);
  border-radius: 3px;
  overflow: hidden;
  margin: 4px 0 10px;
}
#queueProgress .bar {
  height: 100%;
  background: linear-gradient(90deg, var(--ye), var(--mg));
  width: 0%;
  transition: width .25s;
}
#queueCurrent {
  font-size: 12px;
  color: var(--cy);
  margin-bottom: 10px;
  min-height: 14px;
  font-family: 'Share Tech Mono', monospace;
  word-break: break-word;
}
#queueCurrent .estado-chip {
  display: inline-block;
  background: rgba(0,229,255,.18);
  border: 1px solid var(--cy);
  color: var(--cy);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  letter-spacing: 1px;
  font-family: 'Press Start 2P', monospace;
  margin-right: 6px;
  text-transform: uppercase;
}

.queue-nav {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.queue-nav .btn { padding: 14px 4px; font-size: 11px; }
.queue-nav .btn.next {
  background: rgba(255,210,63,.18);
  border-color: var(--ye);
  color: var(--ye);
  font-size: 13px;
}
.queue-nav .btn.next:active { background: var(--ye); color: var(--bg); }

#queueList {
  margin-top: 8px;
  max-height: 220px;
  overflow-y: auto;
  border-top: 1px dashed rgba(255,255,255,.1);
  padding-top: 8px;
  display: none;
}
#queueList.show { display: block; }
.queue-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  font-size: 11px;
  border-radius: 3px;
  cursor: pointer;
  border-left: 3px solid transparent;
  color: rgba(255,255,255,.8);
}
.queue-item:active { background: rgba(255,210,63,.1); }
.queue-item.actual {
  background: rgba(255,210,63,.12);
  border-left-color: var(--ye);
  color: #fff;
}
.queue-item .num {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--mg);
  min-width: 22px;
}
.queue-item .mp3-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  flex-shrink: 0;
}
.queue-item .mp3-dot.ready { background: var(--cy); }
.queue-item .tema { flex: 1; word-break: break-word; }
.queue-item .est { font-size: 9px; color: rgba(255,255,255,.4); }

.queue-empty {
  font-size: 11px;
  color: rgba(255,255,255,.4);
  text-align: center;
  padding: 8px;
}

/* ── INDICADOR "PROCESANDO" (Sprint 7.1) ──────────────────────── */
.proc-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 10px 14px 10px 38px;
  background: linear-gradient(90deg, rgba(255,210,63,.95), rgba(255,46,136,.95));
  color: var(--bg);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 999;
  text-shadow: 0 1px 0 rgba(255,255,255,.3);
  transform: translateY(-100%);
  transition: transform .25s ease-out;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 12px rgba(255,46,136,.4);
}
.proc-bar.show { transform: translateY(0); }
.proc-bar::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 50%;
  width: 12px;
  height: 12px;
  margin-top: -6px;
  border-radius: 50%;
  background: var(--bg);
  animation: proc-pulse 0.8s ease-in-out infinite;
}
@keyframes proc-pulse {
  0%, 100% { transform: scale(0.6); opacity: .5; }
  50%      { transform: scale(1.0); opacity: 1; }
}
.proc-bar .proc-motivo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: .5px;
  text-transform: none;
  color: rgba(6,3,15,.85);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="proc-bar" id="procBar">PROCESANDO<span class="proc-motivo" id="procMotivo"></span></div>

<h1>⚡ TARROBOT CONTROL</h1>
<div class="sub">PANEL EN VIVO · RETROTARROS STUDIO</div>

<!-- COLA DEL EPISODIO -->
<div class="card queue">
  <h2>📋 COLA DEL EPISODIO</h2>
  <select id="queueSelect"><option value="">— sin cola cargada —</option></select>
  <div class="btn-row" style="margin-bottom:8px;">
    <button class="btn ye" onclick="queueLoad()">CARGAR ▸</button>
    <button class="btn" onclick="queueUnload()">DESCARGAR ✕</button>
    <button class="btn cy" onclick="refreshQueueList()" style="flex:0; padding:12px 10px;">🔄</button>
  </div>
  <div id="queueState"><span class="badge">OFF</span>Selecciona una pauta y cargala</div>
  <div id="queueProgress"><div class="bar"></div></div>
  <div id="queueCurrent"></div>
  <div class="queue-nav">
    <button class="btn" onclick="queuePrev()">⏮ PREV</button>
    <button class="btn next" onclick="queueNext()">▶ NEXT</button>
    <button class="btn" onclick="queueReset()">↩ RESET</button>
  </div>
  <button class="btn full cy" onclick="toggleQueueList()" id="toggleListBtn" style="font-size:9px; padding:8px;">VER LISTA ▾</button>
  <div id="queueList"></div>
</div>

<!-- VOZ · push to talk -->
<div class="card">
  <h2>🎤 HABLAR A TARROBOT</h2>
  <button class="btn full ye" id="micBtn" style="font-size:13px; padding:22px 8px;">
    🎤 MANTÉN PRESIONADO Y HABLA
  </button>
  <div id="micStatus" style="margin-top:8px; font-size:11px; color: rgba(255,255,255,.6); text-align:center; min-height:14px;"></div>
  <div id="micTranscript" style="margin-top:6px; padding:8px 10px; font-family:'Share Tech Mono',monospace; font-size:13px; color:#fff; background:rgba(0,0,0,.4); border-left:3px solid var(--cy); border-radius:3px; min-height:18px; display:none;"></div>
  <div id="micAction" style="margin-top:4px; font-size:10px; color:var(--mg); letter-spacing:2px; text-align:right; display:none;"></div>
</div>

<!-- SALUDOS Y DESPEDIDAS -->
<div class="card">
  <h2>👋 SALUDOS · DESPEDIDAS</h2>
  <div class="btn-row">
    <button class="btn ye" onclick="saludar()">👋 HOLA</button>
    <button class="btn cy" onclick="despedir()">😴 CHAO</button>
  </div>
</div>

<!-- CUENTAME -->
<div class="card">
  <h2>💬 CUÉNTAME DE...</h2>
  <input type="text" id="cuentameInput" placeholder="Ej: Super Mario 64, Doom SNES (o escribi 'hola'/'chao')" autocomplete="off">
  <div class="toggle-row">
    <input type="checkbox" id="genIfMissing" checked>
    <label for="genIfMissing">Generar con Claude si no esta en la DB</label>
  </div>
  <button class="btn full cy" onclick="cuentame()">CONTAR DATO ▸</button>
</div>

<!-- OPINAR -->
<div class="card">
  <h2>🤔 ¿QUÉ OPINAS DE...?</h2>
  <input type="text" id="opinarInput" placeholder="Ej: Sonic 06, microtransacciones, Wii U..." autocomplete="off">
  <button class="btn full ye" onclick="opinar()">OPINAR ▸</button>
</div>

<!-- PRECIO -->
<div class="card">
  <h2>💰 REACCIÓN A PRECIO</h2>
  <div class="row-inline">
    <input type="number" id="precioInput" placeholder="USD" style="flex:1" min="0">
    <input type="text" id="precioJuego" placeholder="juego (opcional)" style="flex:2">
  </div>
  <div class="btn-row" style="margin-top:8px;">
    <button class="btn" onclick="precio(100)">$100</button>
    <button class="btn" onclick="precio(500)">$500</button>
    <button class="btn" onclick="precio(2000)">$2K</button>
    <button class="btn" onclick="precio(5000)">$5K</button>
    <button class="btn" onclick="precio(20000)">$20K</button>
  </div>
  <button class="btn full ye" onclick="precioCustom()" style="margin-top:8px;">REACCIONAR ▸</button>
</div>

<!-- RANDOM -->
<div class="card">
  <h2>🎲 DATO RANDOM</h2>
  <div class="btn-row">
    <button class="btn cy" onclick="random_('all')">ALL</button>
    <button class="btn cy" onclick="random_('consola')">CONSOLA</button>
    <button class="btn cy" onclick="random_('juego')">JUEGO</button>
    <button class="btn cy" onclick="random_('musica')">MUSICA</button>
  </div>
</div>

<!-- ESTADOS MANUALES -->
<div class="card">
  <h2>😀 ESTADOS · CARITAS</h2>
  <div class="estados-grid">
    <button class="btn cy" onclick="setState('idle')">idle</button>
    <button class="btn cy" onclick="setState('thinking')">thinking</button>
    <button class="btn cy" onclick="setState('bored')">bored</button>
    <button class="btn cy" onclick="setState('drowsy')">drowsy</button>
    <button class="btn cy" onclick="setState('sleep')">sleep</button>
    <button class="btn cy" onclick="setState('winking')">winking</button>
    <button class="btn ye" onclick="setState('talking')">talking</button>
    <button class="btn ye" onclick="setState('happy')">happy</button>
    <button class="btn ye" onclick="setState('excited')">excited</button>
    <button class="btn ye" onclick="setState('fact')">fact</button>
    <button class="btn" onclick="setState('confused')">confused</button>
    <button class="btn" onclick="setState('sad')">sad</button>
    <button class="btn" onclick="setState('angry')">angry</button>
    <button class="btn" onclick="setState('glitched')">glitched</button>
    <button class="btn" onclick="setState('loading')">loading</button>
  </div>
</div>

<!-- DIAGNOSTICO -->
<div class="card">
  <h2>📡 DIAGNÓSTICO</h2>
  <div class="row-inline" style="margin-bottom:8px;">
    <button class="btn cy" onclick="ping()" style="flex:1">PING</button>
    <button class="btn ye" onclick="clearLog()" style="flex:0">CLR</button>
  </div>
  <div class="log" id="log"></div>
</div>

<script>
const logEl = document.getElementById('log');

// Crea linea de log de forma segura (sin innerHTML, evita XSS)
function logMsg(msg, type) {
  const time = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  if (type) line.className = type;
  line.textContent = '[' + time + '] ' + msg;
  logEl.insertBefore(line, logEl.firstChild);
  // Limitar a 40 lineas
  while (logEl.childNodes.length > 40) {
    logEl.removeChild(logEl.lastChild);
  }
}

function clearLog() {
  while (logEl.firstChild) logEl.removeChild(logEl.firstChild);
}

// Sprint 7.1: indicador "procesando" para no parecer colgado en operaciones lentas
const procBar = document.getElementById('procBar');
const procMotivo = document.getElementById('procMotivo');
let procCount = 0;   // contador (varias requests concurrentes mantienen la barra)

// Motivos por endpoint (humanos, mejor que la URL pelada)
const PROC_LABELS = {
  '/api/cuentame':     'buscando dato...',
  '/api/opinar':       'pensando opinion...',
  '/api/random':       'eligiendo dato random...',
  '/api/precio':       'reaccionando al precio...',
  '/api/saludar':      'preparando saludo...',
  '/api/despedir':     'preparando despedida...',
  '/api/queue/next':   'siguiente item...',
  '/api/queue/prev':   'item anterior...',
  '/api/queue/jump':   'saltando...',
  '/api/queue/load':   'cargando pauta...',
  '/api/state':        '',  // instantaneo, no mostrar barra
  '/api/queue/reset':  '',
  '/api/queue/unload': '',
};

function showProc(motivo) {
  procCount++;
  procMotivo.textContent = motivo ? ('· ' + motivo) : '';
  procBar.classList.add('show');
}
function hideProc() {
  procCount = Math.max(0, procCount - 1);
  if (procCount === 0) procBar.classList.remove('show');
}

async function post(endpoint, body) {
  const label = PROC_LABELS[endpoint];
  const showIt = label !== '' && label !== undefined;
  if (showIt) showProc(label);
  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
    });
    const data = await r.json();
    if (!r.ok) {
      logMsg('ERR ' + endpoint + ': ' + (data.error || r.status), 'err');
      return null;
    }
    return data;
  } catch (e) {
    logMsg('FAIL ' + endpoint + ': ' + e.message, 'err');
    return null;
  } finally {
    if (showIt) hideProc();
  }
}

async function setState(estado) {
  const data = await post('/api/state', { estado: estado });
  if (data) logMsg('-> estado: ' + estado, 'ok');
}

// Palabras atajo que disparan saludo o despedida en lugar de cuentame
const ATAJOS_HOLA = ['hola', 'hello', 'buenas', 'buenos dias', 'que tal'];
const ATAJOS_CHAO = ['chao', 'adios', 'bye', 'hasta luego', 'nos vemos'];

async function cuentame() {
  const raw = document.getElementById('cuentameInput').value.trim();
  if (!raw) { logMsg('falta el tema', 'err'); return; }

  const lower = raw.toLowerCase();
  if (ATAJOS_HOLA.includes(lower)) {
    document.getElementById('cuentameInput').value = '';
    return saludar();
  }
  if (ATAJOS_CHAO.includes(lower)) {
    document.getElementById('cuentameInput').value = '';
    return despedir();
  }

  const gen = document.getElementById('genIfMissing').checked;
  logMsg('procesando: "' + raw + '"...');
  const data = await post('/api/cuentame', { tema: raw, generate_if_missing: gen });
  if (data && data.ok) {
    logMsg('OK ' + data.dato.tema + ' (' + data.dato.estado + ')', 'ok');
  }
}

async function saludar() {
  logMsg('saludando...');
  const data = await post('/api/saludar', {});
  if (data && data.ok) logMsg('OK saludo: "' + data.texto + '"', 'ok');
}

async function despedir() {
  logMsg('despidiendo...');
  const data = await post('/api/despedir', {});
  if (data && data.ok) logMsg('OK chao: "' + data.texto + '"', 'ok');
}

async function opinar() {
  const tema = document.getElementById('opinarInput').value.trim();
  if (!tema) { logMsg('falta el tema para opinar', 'err'); return; }
  logMsg('opinando de "' + tema + '"... (3-5s)');
  const data = await post('/api/opinar', { tema: tema });
  if (data && data.ok) logMsg('OK opinion (' + data.estado + '): "' + data.texto + '"', 'ok');
}

async function precio(valor) {
  const juego = document.getElementById('precioJuego').value.trim();
  logMsg('reaccion a USD ' + valor + (juego ? ' (' + juego + ')' : '') + '...');
  const data = await post('/api/precio', { valor_usd: valor, juego: juego });
  if (data && data.ok) logMsg('OK reaccion (' + data.estado + '): "' + data.texto + '"', 'ok');
}

async function precioCustom() {
  const valor = parseInt(document.getElementById('precioInput').value || '0');
  if (!valor) { logMsg('valor USD invalido', 'err'); return; }
  await precio(valor);
}

async function random_(categoria) {
  logMsg('random ' + categoria + '...');
  const data = await post('/api/random', { categoria: categoria });
  if (data && data.ok) logMsg('OK random: ' + data.dato.tema + ' (' + data.dato.estado + ')', 'ok');
}

async function ping() {
  try {
    const r = await fetch('/api/ping');
    const d = await r.json();
    logMsg('ping OK -- ' + d.live_clients + ' pantalla(s) conectada(s)', 'ok');
  } catch (e) {
    logMsg('ping FAIL: ' + e.message, 'err');
  }
}

document.getElementById('cuentameInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') cuentame();
});

// ─── PUSH-TO-TALK · MICROFONO ─────────────────────────────────────
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const micTranscript = document.getElementById('micTranscript');
const micAction = document.getElementById('micAction');
let mediaRecorder = null;
let audioChunks = [];
let micReady = false;

async function setupMic() {
  if (micReady) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = function(e) {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onstop = async function() {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      audioChunks = [];
      if (blob.size < 1000) {
        micStatus.textContent = 'audio muy corto';
        return;
      }
      micStatus.textContent = 'procesando con Whisper... (~4-10s)';
      micTranscript.style.display = 'none';
      micAction.style.display = 'none';
      showProc('escuchando voz...');
      try {
        const r = await fetch('/api/listen', {
          method: 'POST',
          headers: { 'Content-Type': 'audio/webm' },
          body: blob,
        });
        const data = await r.json();
        if (data.ok) {
          micStatus.textContent = 'OK';
          micTranscript.textContent = '🎙️ ' + (data.transcript || '(vacio)');
          micTranscript.style.display = 'block';
          micAction.textContent = '→ ' + data.accion + (data.params && data.params.tema ? ' (' + data.params.tema + ')' : '');
          micAction.style.display = 'block';
          logMsg('VOZ: "' + data.transcript + '" -> ' + data.accion, 'ok');
        } else {
          micStatus.textContent = 'err: ' + (data.error || 'desconocido');
          if (data.transcript) {
            micTranscript.textContent = '🎙️ ' + data.transcript;
            micTranscript.style.display = 'block';
          }
          logMsg('VOZ err: ' + (data.error || 'desconocido'), 'err');
        }
      } catch (e) {
        micStatus.textContent = 'fail: ' + e.message;
        logMsg('VOZ fail: ' + e.message, 'err');
      } finally {
        hideProc();
      }
    };
    micReady = true;
    return true;
  } catch (e) {
    micStatus.textContent = 'mic denegado: ' + e.message;
    logMsg('mic denegado: ' + e.message, 'err');
    return false;
  }
}

async function startRecord() {
  if (!micReady) {
    const ok = await setupMic();
    if (!ok) return;
  }
  if (mediaRecorder.state === 'recording') return;
  audioChunks = [];
  mediaRecorder.start();
  micBtn.style.background = '#FF2E88';
  micBtn.style.color = '#06030f';
  micStatus.textContent = 'GRABANDO... (suelta para procesar)';
}

function stopRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    micBtn.style.background = '';
    micBtn.style.color = '';
  }
}

micBtn.addEventListener('pointerdown', function(e) { e.preventDefault(); startRecord(); });
micBtn.addEventListener('pointerup', function(e) { e.preventDefault(); stopRecord(); });
micBtn.addEventListener('pointerleave', function() { stopRecord(); });
micBtn.addEventListener('pointercancel', function() { stopRecord(); });
// Touch events para iOS Safari
micBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startRecord(); }, { passive: false });
micBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopRecord(); }, { passive: false });

// ─── COLA DEL EPISODIO ─────────────────────────────────────────────
const queueSelect    = document.getElementById('queueSelect');
const queueState     = document.getElementById('queueState');
const queueProgress  = document.querySelector('#queueProgress .bar');
const queueCurrent   = document.getElementById('queueCurrent');
const queueListEl    = document.getElementById('queueList');
const toggleListBtn  = document.getElementById('toggleListBtn');

let queuePollTimer = null;
let lastQueueIndice = null;

async function refreshQueueList() {
  try {
    const r = await fetch('/api/queue/list');
    const data = await r.json();
    // Limpiar select de forma segura
    while (queueSelect.firstChild) queueSelect.removeChild(queueSelect.firstChild);
    const def = document.createElement('option');
    def.value = '';
    def.textContent = '— elegi una pauta —';
    queueSelect.appendChild(def);
    if (!data.pautas || !data.pautas.length) {
      const o = document.createElement('option');
      o.value = '';
      o.textContent = '(no hay pautas creadas)';
      o.disabled = true;
      queueSelect.appendChild(o);
      return;
    }
    for (const p of data.pautas) {
      const o = document.createElement('option');
      o.value = p.slug;
      o.textContent = p.slug + '  ·  ' + p.total + ' datos  ·  ' + p.mp3_listos + ' mp3s';
      queueSelect.appendChild(o);
    }
    logMsg('cola: ' + data.pautas.length + ' pauta(s) en disco', 'ok');
  } catch (e) {
    logMsg('refreshQueueList fail: ' + e.message, 'err');
  }
}

async function queueLoad() {
  const slug = queueSelect.value;
  if (!slug) { logMsg('elegi una pauta primero', 'err'); return; }
  logMsg('cargando pauta ' + slug + '...');
  const data = await post('/api/queue/load', { slug: slug });
  if (data && data.ok) {
    logMsg('OK cola cargada: ' + slug, 'ok');
    startQueuePoll();
    pollQueueOnce();
  }
}

async function queueUnload() {
  const data = await post('/api/queue/unload', {});
  if (data && data.ok) {
    logMsg('cola descargada', 'ok');
    stopQueuePoll();
    renderQueueState({ loaded: false });
  }
}

async function queueNext() { const d = await post('/api/queue/next', {}); if (d && d.ok) { logMsg('▶ ' + (d.dato && d.dato.tema), 'ok'); pollQueueOnce(); } }
async function queuePrev() { const d = await post('/api/queue/prev', {}); if (d && d.ok) { logMsg('⏮ ' + (d.dato && d.dato.tema), 'ok'); pollQueueOnce(); } }
async function queueReset() { const d = await post('/api/queue/reset', {}); if (d && d.ok) { logMsg('↩ reset', 'ok'); pollQueueOnce(); } }

async function queueJump(idx) {
  const d = await post('/api/queue/jump', { indice: idx });
  if (d && d.ok) { logMsg('→ jump ' + idx + ': ' + (d.dato && d.dato.tema), 'ok'); pollQueueOnce(); }
}

function toggleQueueList() {
  const shown = queueListEl.classList.toggle('show');
  toggleListBtn.textContent = shown ? 'OCULTAR LISTA ▴' : 'VER LISTA ▾';
}

function renderQueueState(status) {
  // Limpia el bloque de estado
  while (queueState.firstChild) queueState.removeChild(queueState.firstChild);
  while (queueCurrent.firstChild) queueCurrent.removeChild(queueCurrent.firstChild);

  if (!status.loaded) {
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = 'OFF';
    queueState.appendChild(badge);
    queueState.appendChild(document.createTextNode('Selecciona una pauta y cargala'));
    queueProgress.style.width = '0%';
    while (queueListEl.firstChild) queueListEl.removeChild(queueListEl.firstChild);
    return;
  }

  // Badge ON
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = 'ON';
  queueState.appendChild(badge);
  const idxDisplay = status.indice < 0 ? 0 : status.indice + 1;
  queueState.appendChild(document.createTextNode(
    status.slug + '  ·  ' + idxDisplay + '/' + status.total +
    '  ·  ' + status.mp3_listos + '/' + status.total + ' mp3s'
  ));

  // Barra de progreso
  const pct = status.total ? (idxDisplay / status.total) * 100 : 0;
  queueProgress.style.width = pct + '%';

  // Item actual
  if (status.actual) {
    const chip = document.createElement('span');
    chip.className = 'estado-chip';
    chip.textContent = status.actual.estado;
    queueCurrent.appendChild(chip);
    queueCurrent.appendChild(document.createTextNode(status.actual.tema));
  } else {
    queueCurrent.appendChild(document.createTextNode('(esperando NEXT)'));
  }

  // Render lista (solo si cambio el indice)
  if (status.indice !== lastQueueIndice) {
    renderQueueList(status);
    lastQueueIndice = status.indice;
  }
}

function renderQueueList(status) {
  while (queueListEl.firstChild) queueListEl.removeChild(queueListEl.firstChild);
  if (!status.datos || !status.datos.length) {
    const e = document.createElement('div');
    e.className = 'queue-empty';
    e.textContent = '(sin items)';
    queueListEl.appendChild(e);
    return;
  }
  status.datos.forEach(function(d, i) {
    const row = document.createElement('div');
    row.className = 'queue-item' + (i === status.indice ? ' actual' : '');
    row.addEventListener('click', function() { queueJump(i); });

    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(i + 1).padStart(2, '0');
    row.appendChild(num);

    const dot = document.createElement('span');
    dot.className = 'mp3-dot' + (d.tiene_mp3 ? ' ready' : '');
    dot.title = d.tiene_mp3 ? 'MP3 listo' : 'sin MP3 (se genera al vuelo)';
    row.appendChild(dot);

    const tema = document.createElement('span');
    tema.className = 'tema';
    tema.textContent = d.tema;
    row.appendChild(tema);

    const est = document.createElement('span');
    est.className = 'est';
    est.textContent = d.estado;
    row.appendChild(est);

    queueListEl.appendChild(row);
  });
}

async function pollQueueOnce() {
  try {
    const r = await fetch('/api/queue/status');
    const data = await r.json();
    renderQueueState(data);
  } catch (e) {
    // silencioso, reintenta en proximo tick
  }
}

function startQueuePoll() {
  stopQueuePoll();
  queuePollTimer = setInterval(pollQueueOnce, 2500);
}

function stopQueuePoll() {
  if (queuePollTimer) {
    clearInterval(queuePollTimer);
    queuePollTimer = null;
  }
}

// Inicializar cola al cargar
refreshQueueList();
pollQueueOnce();

logMsg('Listo. Pulsa un boton.', 'ok');
ping();
</script>
