<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETROTARROS · TarroBot · {{TEMA}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root {
  --mg: #FF2E88; --cy: #00E5FF; --ye: #FFD23F; --pu: #2D1B69;
  --bo: #F5F0E8; --dk: #06030f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--dk); font-family: 'Share Tech Mono', monospace; color: var(--bo); }
body {
  background-image:
    radial-gradient(ellipse 100% 50% at 50% -5%, rgba(255,46,136,.12) 0%, transparent 65%),
    repeating-linear-gradient(0deg, transparent 0px, transparent 39px, rgba(255,255,255,.014) 39px, rgba(255,255,255,.014) 40px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(255,255,255,.014) 39px, rgba(255,255,255,.014) 40px);
}
header { position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 200; background: rgba(6,3,15,.97); border-bottom: 2px solid var(--mg); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
.hdr-logo { font-family: 'Orbitron'; font-weight: 900; font-size: 20px; color: var(--mg); text-shadow: 0 0 14px rgba(255,46,136,.6); letter-spacing: 3px; }
.hdr-tag { font-family: 'Share Tech Mono'; font-size: 12px; color: var(--ye); letter-spacing: 3px; }
.hdr-rec { display: flex; align-items: center; gap: 8px; font-family: 'Press Start 2P'; font-size: 8px; color: var(--mg); }
.dot { width: 10px; height: 10px; background: var(--mg); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

.stage { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; }
.slide { position: absolute; inset: 0; padding: 24px 40px; overflow: hidden; opacity: 1; }

.slide-tarrobot { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; height: 100%; align-items: center; max-width: 1500px; margin: 0 auto; padding: 16px 16px 30px; }
.tarrobot-stage { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 0; container-type: size; }
.tarrobot-stage .tarrovision { width: min(100cqh, 100cqw); height: min(100cqh, 100cqw); max-width: 100%; max-height: 100%; }

.tarrovision { background: linear-gradient(180deg, #1a1a1f 0%, #0d0d12 100%); border-radius: 22px; padding: 18px 22px; box-shadow: 0 0 0 2px rgba(255,255,255,.04), 0 18px 50px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.08), inset 0 -2px 0 rgba(0,0,0,.4); display: grid; grid-template-rows: auto 1fr auto; gap: 10px; }
.tv-controls-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 4px; }
.tv-led { width: 9px; height: 9px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff8fb8 0%, var(--mg) 60%, #7a0030 100%); box-shadow: 0 0 10px rgba(255,46,136,.8), inset 0 0 2px rgba(0,0,0,.5); }
.tv-brand { flex: 1; text-align: center; font-family: 'Press Start 2P'; font-size: 11px; color: var(--ye); letter-spacing: 3px; text-shadow: 0 0 8px rgba(255,210,63,.4); }
.tv-channel { font-family: 'Share Tech Mono'; font-size: 12px; color: var(--cy); letter-spacing: 2px; padding: 3px 9px; border: 1px solid rgba(0,229,255,.4); background: rgba(0,229,255,.06); }
.tv-screen { position: relative; background: #2a2a2f; border-radius: 12px; padding: 14px; box-shadow: inset 0 0 0 2px #3a3a3f, inset 0 0 14px rgba(0,0,0,.6); min-height: 0; }
.tv-screen-inner { position: relative; width: 100%; height: 100%; background: #0a0820; background-image: radial-gradient(circle at 50% 50%, #1a1442 0%, #050310 80%); border-radius: 16px / 8px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), inset 0 0 40px rgba(0,0,0,.95); display: flex; align-items: center; justify-content: center; }
.tv-screen-inner::before { content: ""; position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.20) 2px, rgba(0,0,0,.20) 3px); z-index: 10; }
.tv-screen-inner::after { content: ""; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 110% 70% at 50% 0%, rgba(255,255,255,.10) 0%, transparent 55%), radial-gradient(ellipse 90% 50% at 50% 100%, rgba(0,229,255,.08) 0%, transparent 60%); z-index: 11; }
.tv-controls-bottom { display: grid; grid-template-columns: auto auto 1fr; align-items: center; gap: 12px; padding: 2px 4px 0; }
.tv-knob { width: 30px; height: 30px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #5a5a60 0%, #2a2a30 60%, #0a0a0e 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,.15), inset 0 -2px 0 rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.6); position: relative; }
.tv-knob::after { content: ""; position: absolute; top: 6px; left: 50%; width: 2px; height: 10px; background: var(--ye); transform-origin: bottom center; transform: translateX(-50%) rotate(45deg); box-shadow: 0 0 4px rgba(255,210,63,.6); }
.tv-knob.cy::after { background: var(--cy); box-shadow: 0 0 4px rgba(0,229,255,.6); transform: translateX(-50%) rotate(-30deg); }
.tv-speaker { height: 24px; background: repeating-linear-gradient(90deg, #0a0a0e 0px, #0a0a0e 3px, #1a1a1f 3px, #1a1a1f 6px); border-radius: 4px; box-shadow: inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.6); }

.tarrobot-face { position: relative; width: 70%; aspect-ratio: 1.2 / 1; z-index: 5; }
.tarrobot-face svg { width: 100%; height: 100%; display: block; shape-rendering: crispEdges; filter: drop-shadow(0 0 12px rgba(0,229,255,.4)); }

@keyframes tb-blink { 0%, 92%, 100% { transform: scaleY(1); } 94%, 98% { transform: scaleY(0.1); } }
.tarrobot-face .tb-eye-shape { transform-origin: center; animation: tb-blink 4s ease-in-out infinite; }
@keyframes tb-talk { 0%, 100% { transform: scaleY(0.3); } 20% { transform: scaleY(1); } 40% { transform: scaleY(0.5); } 60% { transform: scaleY(1); } 80% { transform: scaleY(0.7); } }
.is-talking .tb-mouth-talking { transform-origin: center; animation: tb-talk 0.6s ease-in-out infinite; }
.tb-glasses { opacity: 0; transition: opacity .25s; }
.is-talking .tb-glasses, .is-excited .tb-glasses { opacity: 1; }

.tb-mouth-idle, .tb-mouth-talking, .tb-mouth-excited, .tb-mouth-sleep, .tb-mouth-thinking, .tb-mouth-winking, .tb-mouth-confused, .tb-mouth-glitched, .tb-mouth-fact, .tb-mouth-happy, .tb-mouth-sad, .tb-mouth-angry, .tb-mouth-loading { display: none; }
.is-idle .tb-mouth-idle { display: block; }
.is-talking .tb-mouth-talking { display: block; }
.is-excited .tb-mouth-excited { display: block; }
.is-sleep .tb-mouth-sleep { display: block; }
.is-thinking .tb-mouth-thinking { display: block; }
.is-winking .tb-mouth-winking { display: block; }
.is-confused .tb-mouth-confused { display: block; }
.is-glitched .tb-mouth-glitched { display: block; }
.is-fact .tb-mouth-fact { display: block; }
.is-happy .tb-mouth-happy { display: block; }
.is-sad .tb-mouth-sad { display: block; }
.is-angry .tb-mouth-angry { display: block; }
.is-loading .tb-mouth-loading { display: block; }

.tb-eyes-default, .tb-eyes-excited, .tb-eyes-sleep, .tb-eyes-thinking, .tb-eyes-winking, .tb-eyes-confused, .tb-eyes-glitched, .tb-eyes-happy, .tb-eyes-sad, .tb-eyes-angry, .tb-eyes-loading { display: none; }
.is-idle .tb-eyes-default, .is-talking .tb-eyes-default, .is-fact .tb-eyes-default { display: block; }
.is-excited .tb-eyes-excited { display: block; }
.is-sleep .tb-eyes-sleep { display: block; }
.is-thinking .tb-eyes-thinking { display: block; }
.is-winking .tb-eyes-winking { display: block; }
.is-confused .tb-eyes-confused { display: block; }
.is-glitched .tb-eyes-glitched { display: block; }
.is-happy .tb-eyes-happy { display: block; }
.is-sad .tb-eyes-sad { display: block; }
.is-angry .tb-eyes-angry { display: block; }
.is-loading .tb-eyes-loading { display: block; }

.tb-extras { display: none; }
.is-thinking .tb-extras-thinking, .is-confused .tb-extras-confused, .is-fact .tb-extras-fact, .is-sad .tb-extras-sad, .is-angry .tb-extras-angry, .is-loading .tb-extras-loading, .is-sleep .tb-extras-sleep { display: block; }

@keyframes tb-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.tb-extras-thinking, .tb-extras-confused { animation: tb-bounce 1.2s ease-in-out infinite; transform-origin: center; }
@keyframes tb-flash { 0%,100%{opacity:0;transform:scale(0.8)} 20%,80%{opacity:1;transform:scale(1.05)} }
.tb-extras-fact { animation: tb-flash 1.5s ease-in-out infinite; transform-origin: center; }
@keyframes tb-rotate-dots { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
.tb-extras-loading { transform-origin: 60px 14px; animation: tb-rotate-dots 1.4s linear infinite; }
@keyframes tb-tear-drop { 0%{transform:translateY(0);opacity:1} 90%{transform:translateY(40px);opacity:1} 100%{transform:translateY(45px);opacity:0} }
.tb-tear { animation: tb-tear-drop 2s ease-in infinite; transform-origin: center; }
@keyframes tb-glitch { 0%,100%{transform:translate(0,0)} 20%{transform:translate(2px,-1px)} 40%{transform:translate(-2px,1px)} 60%{transform:translate(1px,2px)} 80%{transform:translate(-1px,-2px)} }
.is-glitched .tarrobot-face svg { animation: tb-glitch 0.18s ease-in-out infinite; }
@keyframes tb-anger-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-1px)} 75%{transform:translateX(1px)} }
.is-angry .tarrobot-face svg { animation: tb-anger-shake 0.15s ease-in-out infinite; }

.tarrobot-dato { display: flex; flex-direction: column; gap: 18px; align-self: center; }
.td-label { font-family: 'Press Start 2P'; font-size: 13px; color: var(--ye); letter-spacing: 3px; padding: 8px 14px; border: 1px solid var(--ye); background: rgba(255,210,63,.08); display: inline-flex; align-items: center; gap: 8px; align-self: flex-start; }
.td-text { font-family: 'Orbitron'; font-weight: 700; font-size: 28px; line-height: 1.35; color: #fff; letter-spacing: .5px; }
.td-text .quote { color: var(--cy); }
.td-tag { font-family: 'Press Start 2P'; font-size: 10px; color: var(--mg); letter-spacing: 3px; padding-top: 12px; border-top: 1px dashed rgba(255,46,136,.4); }
</style>
</head>
<body>

<header>
  <div class="hdr-logo">RETROTARROS</div>
  <div class="hdr-tag">TARROBOT · {{TEMA}}</div>
  <div class="hdr-rec"><div class="dot"></div>EN VIVO</div>
</header>

<div class="stage">
  <section class="slide active">
  <div class="slide-tarrobot">
    <div class="tarrobot-stage">
      <div class="tarrovision">
        <div class="tv-controls-top">
          <span class="tv-led"></span>
          <span class="tv-brand">TARROBOT</span>
          <span class="tv-channel">{{CHANNEL}}</span>
        </div>
        <div class="tv-screen"><div class="tv-screen-inner">
          <div class="tarrobot-face is-{{ESTADO}}">
            <svg viewBox="0 0 120 100" preserveAspectRatio="xMidYMid meet">
              <!-- OJOS DEFAULT (idle/talking/fact) -->
              <g class="tb-eyes-default">
                <g class="tb-eye-shape"><rect x="28" y="34" width="18" height="18" fill="#00E5FF"/><rect x="34" y="40" width="6" height="6" fill="#0a0820"/></g>
                <g class="tb-eye-shape"><rect x="74" y="34" width="18" height="18" fill="#00E5FF"/><rect x="80" y="40" width="6" height="6" fill="#0a0820"/></g>
              </g>
              <!-- OJOS EXCITED (estrellas) -->
              <g class="tb-eyes-excited">
                <rect x="32" y="30" width="14" height="4" fill="#FFD23F"/><rect x="36" y="26" width="6" height="14" fill="#FFD23F"/>
                <rect x="74" y="30" width="14" height="4" fill="#FFD23F"/><rect x="78" y="26" width="6" height="14" fill="#FFD23F"/>
              </g>
              <!-- OJOS SLEEP -->
              <g class="tb-eyes-sleep">
                <rect x="28" y="42" width="18" height="4" fill="#00E5FF"/>
                <rect x="74" y="42" width="18" height="4" fill="#00E5FF"/>
              </g>
              <!-- OJOS THINKING (pupila arriba derecha) -->
              <g class="tb-eyes-thinking">
                <rect x="28" y="34" width="18" height="18" fill="#00E5FF"/><rect x="38" y="36" width="6" height="6" fill="#0a0820"/>
                <rect x="74" y="34" width="18" height="18" fill="#00E5FF"/><rect x="84" y="36" width="6" height="6" fill="#0a0820"/>
              </g>
              <!-- OJOS WINKING -->
              <g class="tb-eyes-winking">
                <rect x="28" y="34" width="18" height="18" fill="#00E5FF"/><rect x="34" y="40" width="6" height="6" fill="#0a0820"/>
                <rect x="74" y="42" width="18" height="4" fill="#00E5FF"/><rect x="78" y="40" width="2" height="2" fill="#00E5FF"/><rect x="86" y="40" width="2" height="2" fill="#00E5FF"/>
              </g>
              <!-- OJOS CONFUSED (descoordinados) -->
              <g class="tb-eyes-confused">

                <rect x="74" y="34" width="18" height="18" fill="#00E5FF"/><rect x="80" y="46" width="6" height="6" fill="#0a0820"/>
              </g>
              <!-- OJOS GLITCHED (RGB split) -->
              <g class="tb-eyes-glitched">
                <rect x="26" y="34" width="18" height="18" fill="#FF2E88" opacity=".7"/><rect x="30" y="34" width="18" height="18" fill="#00E5FF" opacity=".7"/><rect x="34" y="40" width="6" height="6" fill="#0a0820"/>
                <rect x="72" y="34" width="18" height="18" fill="#FF2E88" opacity=".7"/><rect x="76" y="34" width="18" height="18" fill="#00E5FF" opacity=".7"/><rect x="80" y="40" width="6" height="6" fill="#0a0820"/>
              </g>
              <!-- OJOS HAPPY (^_^) -->
              <g class="tb-eyes-happy">
                <rect x="28" y="40" width="4" height="3" fill="#00E5FF"/><rect x="32" y="36" width="4" height="3" fill="#00E5FF"/><rect x="36" y="32" width="4" height="3" fill="#00E5FF"/><rect x="40" y="36" width="4" height="3" fill="#00E5FF"/><rect x="44" y="40" width="4" height="3" fill="#00E5FF"/>
                <rect x="72" y="40" width="4" height="3" fill="#00E5FF"/><rect x="76" y="36" width="4" height="3" fill="#00E5FF"/><rect x="80" y="32" width="4" height="3" fill="#00E5FF"/><rect x="84" y="36" width="4" height="3" fill="#00E5FF"/><rect x="88" y="40" width="4" height="3" fill="#00E5FF"/>
              </g>
              <!-- OJOS SAD -->
              <g class="tb-eyes-sad">
                <rect x="28" y="24" width="4" height="3" fill="#00E5FF"/><rect x="32" y="26" width="4" height="3" fill="#00E5FF"/><rect x="36" y="28" width="4" height="3" fill="#00E5FF"/><rect x="40" y="30" width="4" height="3" fill="#00E5FF"/>
                <rect x="28" y="38" width="18" height="18" fill="#00E5FF"/><rect x="34" y="46" width="6" height="6" fill="#0a0820"/>
                <rect x="76" y="30" width="4" height="3" fill="#00E5FF"/><rect x="80" y="28" width="4" height="3" fill="#00E5FF"/><rect x="84" y="26" width="4" height="3" fill="#00E5FF"/><rect x="88" y="24" width="4" height="3" fill="#00E5FF"/>
                <rect x="74" y="38" width="18" height="18" fill="#00E5FF"/><rect x="80" y="46" width="6" height="6" fill="#0a0820"/>
              </g>
              <!-- OJOS ANGRY -->
              <g class="tb-eyes-angry">
                <rect x="28" y="22" width="4" height="3" fill="#FF2E88"/><rect x="32" y="24" width="4" height="3" fill="#FF2E88"/><rect x="36" y="26" width="4" height="3" fill="#FF2E88"/><rect x="40" y="28" width="6" height="3" fill="#FF2E88"/>
                <rect x="28" y="38" width="18" height="14" fill="#FF2E88"/><rect x="34" y="42" width="6" height="6" fill="#0a0820"/>
                <rect x="74" y="28" width="6" height="3" fill="#FF2E88"/><rect x="80" y="26" width="4" height="3" fill="#FF2E88"/><rect x="84" y="24" width="4" height="3" fill="#FF2E88"/><rect x="88" y="22" width="4" height="3" fill="#FF2E88"/>

              </g>
              <!-- OJOS LOADING -->

                <rect x="28" y="36" width="18" height="3" fill="#00E5FF"/><rect x="28" y="42" width="18" height="3" fill="#00E5FF" opacity=".7"/><rect x="28" y="48" width="18" height="3" fill="#00E5FF" opacity=".4"/>
                <rect x="74" y="36" width="18" height="3" fill="#00E5FF"/><rect x="74" y="42" width="18" height="3" fill="#00E5FF" opacity=".7"/><rect x="74" y="48" width="18" height="3" fill="#00E5FF" opacity=".4"/>
              </g>

              <!-- LENTES GEEK -->

              <g class="tb-mouth-fact"><rect x="48" y="72" width="24" height="4" fill="#FFD23F"/></g>
